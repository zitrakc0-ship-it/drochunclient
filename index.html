<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Client — Новый уровень кастомизации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            /* Чистый CSS градиент под серое матовое стекло, никаких внешних картинок */
            background: #141517 radial-gradient(circle at 30% 20%, #282a30 0%, #0e0f11 100%) no-repeat fixed;
            color: #e3e4e6;
            overflow-x: hidden;
            height: 100vh;
        }

        /* ================= ИНТРО ЭКРАН ================= */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #090a0c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
            cursor: pointer;
        }

        .glass-title {
            font-size: 5rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.1;
            color: rgba(255, 255, 255, 0.9);
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
            -webkit-background-clip: text;
            backdrop-filter: blur(4px);
            text-shadow: 0px 1px 1px rgba(255, 255, 255, 0.2), 0px 10px 30px rgba(0, 0, 0, 0.6);
            letter-spacing: -1px;
            animation: glassFadeIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .glass-title span {
            display: block;
            font-size: 2rem;
            font-weight: 400;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        /* ================= ШАПКА САЙТА ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(35, 37, 43, 0.25);
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* НАСТОЯЩИЙ КОНТРАСТНЫЙ ЧЕРНО-БЕЛЫЙ ГРАДИЕНТ */
        .gradient-text {
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 40%, #1a1a1a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }

        .logo {
            font-size: 24px;
            letter-spacing: 2.5px;
        }

        /* СТЕКЛЯННЫЕ КНОПКИ НАВИГАЦИИ */
        .nav-capsule {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 40px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.02), 0 10px 25px rgba(0,0,0,0.4);
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 
                inset 0 1px 2px rgba(255,255,255,0.15),
                inset 6px 0 14px -3px rgba(59, 130, 246, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .search-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-left: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .search-circle:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ================= МЕНЮ ЦЕНТР ================= */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 6rem; /* Крупный заголовок */
            letter-spacing: -1.5px;
            margin-bottom: 25px;
            line-height: 1.05;
        }

        .hero-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-glass {
            padding: 16px 36px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: 35px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 15px 35px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
        }

        .btn-glass.primary {
            background: rgba(255, 255, 255, 0.9);
            color: #0b0c10;
            border: none;
            box-shadow: 0 15px 35px rgba(255,255,255,0.15);
        }

        .btn-glass.primary:hover {
            background: #ffffff;
            box-shadow: 0 20px 40px rgba(255,255,255,0.3);
        }

        @keyframes glassFadeIn {
            0% { opacity: 0; transform: scale(0.97); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .intro-hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ================= ИНТРО ЭКРАН (ЗАКРЫВАЕТСЯ АВТОМАТИЧЕСКИ ИЛИ ПО КЛИКУ) ================= -->
    <div class="intro-overlay" id="introScreen" onclick="startApp()">
        <h1 class="glass-title">
            Void Client
            <span>путь к победе!</span>
        </h1>
    </div>

    <!-- ================= ШАПКА САЙТА (СТЕКЛЯННЫЕ КНОПКИ) ================= -->
    <header>
        <div class="logo gradient-text">Void Client</div>
        
        <div style="display: flex; align-items: center;">
            <nav class="nav-capsule">
                <a href="#main" class="nav-item active">
                    <span style="display:inline-block; width:8px; height:8px; background:#3b82f6; border-radius:50%;"></span>
                    Главная
                </a>
                <a href="#features" class="nav-item">Преимущества</a>
                <a href="#download" class="nav-item">Скачать</a>
            </nav>
            
            <div class="search-circle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </header>

    <!-- ================= ЦЕНТРАЛЬНЫЙ БЛОК ГЛАВНОГО МЕНЮ ================= -->
    <section class="hero" id="main">
        <!-- Текст "Void Client" вместо максимальной скорости -->
        <h1 class="gradient-text">Void Client</h1>
        
        <!-- Стеклянные кнопки прямо под текстом -->
        <div class="hero-controls">
            <a href="#download" class="btn-glass primary">Попробовать бесплатно</a>
            <a href="#features" class="btn-glass">Узнать больше</a>
        </div>
    </section>

    <!-- ================= СКРИПТ УПРАВЛЕНИЯ ПЕРЕХОДОМ ================= -->
    <script>
        function startApp() {
            const intro = document.getElementById('introScreen');
            if (intro) {
                intro.classList.add('intro-hidden');
            }
        }

        // Автоматический переход через 2.5 секунды
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(startApp, 2500);
        });
    </script>

</body>
</html>
