<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Client — Новый уровень кастомизации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            /* Серый матовый глубокий фон вместо синего */
            background: #1c1d21 radial-gradient(circle at 50% 50%, #2d2f36 0%, #121316 100%);
            color: #e3e4e6;
            overflow-x: hidden;
            height: 100vh;
        }

        /* ================= ИНТРО ЭКРАН (ОТКРЫВАЕТСЯ ПЕРВЫМ) ================= */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f1012;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
            cursor: pointer; /* Клик в любое место закроет интро */
        }

        .glass-title {
            font-size: 5rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.1;
            color: rgba(255, 255, 255, 0.9);
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
            -webkit-background-clip: text;
            backdrop-filter: blur(4px);
            text-shadow: 
                0px 1px 1px rgba(255, 255, 255, 0.2),
                0px 10px 30px rgba(0, 0, 0, 0.6);
            letter-spacing: -1px;
            animation: glassFadeIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .glass-title span {
            display: block;
            font-size: 2rem;
            font-weight: 400;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        /* ================= ГЛАВНОЕ МЕНЮ (СЕРЫЙ МАТОВЫЙ СТИЛЬ) ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            /* Качественная серая матовая плашка */
            background: rgba(40, 42, 48, 0.35);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* ЛОГОТИП С ЧЕРНО-БЕЛЫМ ГРАДИЕНТОМ */
        .logo {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1a1 50%, #222222 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3));
        }

        .nav-capsule {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 5px;
            border-radius: 30px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.03);
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 25px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 
                inset 0 1px 1px rgba(255,255,255,0.15),
                inset 6px 0 12px -3px rgba(59, 130, 246, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-circle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-left: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-circle:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            color: #fff;
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .hero h1 span {
            color: #66fcf1;
            text-shadow: 0 0 20px rgba(102, 252, 241, 0.3);
        }

        .hero p {
            font-size: 1.15rem;
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
            color: rgba(255,255,255,0.5);
        }

        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
        }

        @keyframes glassFadeIn {
            0% { opacity: 0; transform: scale(0.97); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .intro-hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ================= ИНТРО ЭКРАН (ЗАКРЫВАЕТСЯ АВТОМАТИЧЕСКИ ИЛИ ПО КЛИКУ) ================= -->
    <div class="intro-overlay" id="introScreen" onclick="startApp()">
        <h1 class="glass-title">
            Void Client
            <span>путь к победе!</span>
        </h1>
    </div>

    <!-- ================= ГЛАВНОЕ МЕНЮ (СЕРЫЙ МАТОВЫЙ СТИЛЬ) ================= -->
    <header>
        <!-- Черно-белый градиентный логотип -->
        <div class="logo">Void Client</div>
        
        <div style="display: flex; align-items: center;">
            <nav class="nav-capsule">
                <a href="#main" class="nav-item active">
                    <span style="display:inline-block; width:8px; height:8px; background:#3b82f6; border-radius:50%;"></span>
                    Главная
                </a>
                <a href="#features" class="nav-item">Преимущества</a>
                <a href="#download" class="nav-item">Скачать</a>
            </nav>
            
            <div class="search-circle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </header>

    <section class="hero" id="main">
        <h1>Максимальная <span>Скорость</span></h1>
        <p>Void Client — передовое решение для тотального доминирования, оптимизации FPS и кастомизации игрового пространства под любые задачи.</p>
        <a href="#download" class="btn">Попробовать бесплатно</a>
    </section>

    <!-- ================= СКРИПТ УПРАВЛЕНИЯ ПЕРЕХОДОМ ================= -->
    <script>
        // Функция скрытия интро экрана
        function startApp() {
            const intro = document.getElementById('introScreen');
            if (intro) {
                intro.classList.add('intro-hidden');
            }
        }

        // Автоматический переход в главное меню через 2.5 секунды, если пользователь не кликнул раньше
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(startApp, 2500);
        });
    </script>

</body>
</html>
