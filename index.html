<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Client — Новый уровень кастомизации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #08090a;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 75% 70%, rgba(255, 255, 255, 0.05) 0%, transparent 45%),
                linear-gradient(135deg, #0d0e10 0%, #16181c 40%, #070809 70%, #111215 100%);
            background-attachment: fixed;
            color: #e3e4e6;
            overflow-x: hidden;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 35% 45%, rgba(255,255,255,0.4) 1px, transparent 2px),
                radial-gradient(circle at 70% 30%, rgba(255,255,255,0.3) 2px, transparent 4px),
                radial-gradient(circle at 45% 75%, rgba(255,255,255,0.5) 1px, transparent 2px),
                radial-gradient(circle at 80% 85%, rgba(255,255,255,0.2) 3px, transparent 6px);
            pointer-events: none;
            opacity: 0.5;
            z-index: 1;
        }

        /* Холст для падающих частиц */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* ================= ИНТРО ЭКРАН ================= */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #060708;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
            cursor: pointer;
        }

        .glass-title {
            font-size: 5rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.1;
            color: rgba(255, 255, 255, 0.9);
            background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
            -webkit-background-clip: text;
            backdrop-filter: blur(4px);
            text-shadow: 0px 1px 1px rgba(255, 255, 255, 0.2), 0px 10px 30px rgba(0, 0, 0, 0.7);
            letter-spacing: -1px;
            animation: glassFadeIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .glass-title span {
            display: block;
            font-size: 2rem;
            font-weight: 400;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 2px;
        }

        @keyframes glassFadeIn {
            0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* ================= ШАПКА САЙТА ================= */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(20, 21, 25, 0.3);
            backdrop-filter: blur(35px) saturate(150%);
            -webkit-backdrop-filter: blur(35px) saturate(150%);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .gradient-text {
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #a6a6a6 45%, #141414 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.6));
        }

        .logo {
            font-size: 24px;
            letter-spacing: 2.5px;
        }

        .nav-capsule {
            display: flex;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 6px;
            border-radius: 40px;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.01), 0 12px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .nav-item.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 
                inset 0 1px 2px rgba(255,255,255,0.1),
                inset 6px 0 14px -3px rgba(59, 130, 246, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .search-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-left: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .search-circle:hover {
            background: rgba(255, 255, 255, 0.08);
        }
                /* ================= МЕНЮ ЦЕНТР ================= */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .hero h1 {
            font-size: 6.5rem;
            letter-spacing: -2px;
            margin-bottom: 30px;
            line-height: 1;
        }

        .hero-controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-glass {
            padding: 16px 38px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border-radius: 35px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-2px);
        }

        /* ================= МОДАЛЬНОЕ ОКНО ПРЕИМУЩЕСТВ ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 6, 8, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background: rgba(20, 22, 26, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05), 0 25px 60px rgba(0,0,0,0.8);
            border-radius: 32px;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            position: relative;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-container {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .feature-box {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
            transition: all 0.3s ease;
        }

        .feature-box:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .feature-box h3 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .feature-box p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        /* ================= АДАПТИВ ДЛЯ МОБИЛЬНЫХ (ТЕЛЕФОНЫ) ================= */
        @media (max-width: 768px) {
            header {
                padding: 15px 5%;
            }

            .logo {
                font-size: 20px;
                letter-spacing: 1.5px;
            }

            .nav-capsule {
                padding: 4px;
            }

            .nav-item {
                padding: 10px 16px;
                font-size: 12px;
                gap: 4px;
            }

            .search-circle {
                width: 38px;
                height: 38px;
                margin-left: 8px;
            }

            .hero h1 {
                font-size: 3.5rem;
                margin-bottom: 20px;
            }

            .hero-controls {
                flex-direction: column;
                width: 100%;
                max-width: 280px;
                gap: 12px;
            }

            .btn-glass {
                padding: 14px 25px;
                font-size: 14px;
                text-align: center;
            }

            .glass-title {
                font-size: 3rem;
            }

            .glass-title span {
                font-size: 1.2rem;
            }

            .modal-container {
                padding: 30px 20px;
                border-radius: 24px;
            }

            .modal-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .feature-box {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .nav-item {
                padding: 8px 12px;
                font-size: 11px;
            }
            
            .hero h1 {
                font-size: 2.8rem;
            }
                <!-- Фоновый холст для падающих частиц -->
    <canvas id="particles-canvas"></canvas>

    <!-- ИНТРО ЭКРАН -->
    <div class="intro-overlay" id="introOverlay">
        <h1 class="glass-title">
            VOID CLIENT
            <span>Кликните для запуска интерфейса</span>
        </h1>
    </div>

    <!-- ШАПКА САЙТА -->
    <header>
        <div class="logo gradient-text">Void</div>
        <div style="display: flex; align-items: center;">
            <nav class="nav-capsule">
                <div class="nav-item active" id="navHome">Главная</div>
                <div class="nav-item" id="navFeatures">Преимущества</div>
            </nav>
            <div class="search-circle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </header>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <main class="hero">
        <h1 class="gradient-text">Void Client</h1>
        <div class="hero-controls">
            <div class="btn-glass" id="btnOpenFeatures">Преимущества</div>
            <div class="btn-glass">Скачать</div>
        </div>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО ПРЕИМУЩЕСТВ -->
    <div class="modal-overlay" id="featuresModal">
        <div class="modal-container">
            <div class="modal-close" id="btnCloseFeatures">&times;</div>
            <h2 class="gradient-text" style="font-size: 2rem; margin-bottom: 25px; text-align: center;">Наши преимущества</h2>
            <div class="modal-grid">
                <div class="feature-box">
                    <h3>Оптимизация</h3>
                    <p>Наш клиент оптимизирован, и готов к лучшей и комфортной работе</p>
                </div>
                <div class="feature-box">
                    <h3>Обновления</h3>
                    <p>Наш клиент регулярно обновляется, и прислушивается к идеям пользователей</p>
                </div>
                <div class="feature-box">
                    <h3>Красота</h3>
                    <p>Наш клиент обладает очень красивыми визуальными функциями</p>
                </div>
                <div class="feature-box">
                    <h3>Функционал</h3>
                    <p>Также клиент имеет гибкий мультисерверный набор функций</p>
                </div>
            </div>
        </div>
    </div>

    <!-- СЦЕНАРИИ И ЛОГИКА ИНТЕРФЕЙСА -->
    <script>
        // --- 1. Работа Интро Экрана ---
        const introOverlay = document.getElementById('introOverlay');
        
        function closeIntro() {
            introOverlay.style.opacity = '0';
            introOverlay.style.transform = 'translateY(-100%)';
            setTimeout(() => {
                introOverlay.style.display = 'none';
            }, 800);
        }

        introOverlay.addEventListener('click', closeIntro);
        setTimeout(closeIntro, 3500);

        // --- 2. Модальное окно Преимущества ---
        const featuresModal = document.getElementById('featuresModal');
        const btnOpenFeatures = document.getElementById('btnOpenFeatures');
        const navFeatures = document.getElementById('navFeatures');
        const navHome = document.getElementById('navHome');
        const btnCloseFeatures = document.getElementById('btnCloseFeatures');

        function openModal() {
            featuresModal.classList.add('active');
            navFeatures.classList.add('active');
            navHome.classList.remove('active');
        }

        function closeModal() {
            featuresModal.classList.remove('active');
            navFeatures.classList.remove('active');
            navHome.classList.add('active');
        }

        btnOpenFeatures.addEventListener('click', openModal);
        navFeatures.addEventListener('click', openModal);
        btnCloseFeatures.addEventListener('click', closeModal);

        featuresModal.addEventListener('click', (e) => {
            if (e.target === featuresModal) {
                closeModal();
            }
        });

        navHome.addEventListener('click', closeModal);

        // --- 3. Падающие частицы (Вечный Снег) ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 75; // Оптимально для телефонов

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height; // Первичный разброс
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = Math.random() * 2.5 + 0.5; // Размер снежинок
                this.speedY = Math.random() * 1.2 + 0.4; // Скорость падения
                this.speedX = Math.random() * 0.6 - 0.3; // Легкое покачивание в стороны
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                // Перезапуск частицы при выходе за нижний или боковой край
                if (this.y > canvas.height + 10 || this.x > canvas.width + 10 || this.x < -10) {
                    this.reset();
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Сброс тени для оптимизации отрисовки кадров
            ctx.shadowBlur = 0; 
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();
    </script>
</body>
</html>
